name: secret-scan

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan working tree + git history
        run: |
          gitleaks dir . --config .gitleaks.toml --no-banner --redact --exit-code 1
          gitleaks git . --config .gitleaks.toml --no-banner --redact --exit-code 1
