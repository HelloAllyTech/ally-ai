name: secret-scan

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan working tree
        run: gitleaks dir . --config .gitleaks.toml --no-banner --redact --exit-code 1
      - name: Scan PR diff (only commits not on base branch)
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          gitleaks git . --log-opts="--no-merges $BASE_SHA..$HEAD_SHA" --config .gitleaks.toml --no-banner --redact --exit-code 1
