# Set the following GitHub action Repository Variables
#
# ECR_REPOSITORY
#
# PRD_AWS_ROLE
# PRD_AWS_REGION
#
# STG_AWS_ROLE
# STG_AWS_REGION
#
# DEV_AWS_ROLE
# DEV_AWS_REGION

name: Deploy lifeline-ai

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      Environment:
        required: true
        type: choice
        description: Choose env
        options:
          - dev
          - stg
          - prd
  push:
    branches:
      - dev
      - stg

jobs:
  prepare-env:
    name: Prepare Env
    runs-on: ubuntu-22.04
    timeout-minutes: 2
    outputs:
      AWS_ROLE: ${{ steps.vars.outputs.AWS_ROLE }}
      AWS_REGION: ${{ steps.vars.outputs.AWS_REGION }}
      ENV: ${{ steps.vars.outputs.ENV }}
      PROJECT_PREFIX: ${{ steps.vars.outputs.PROJECT_PREFIX }}
      SUBNETS: ${{ steps.vars.outputs.SUBNETS }}
      SECURITY_GROUPS: ${{ steps.vars.outputs.SECURITY_GROUPS }}
      ECS_CLUSTER: ${{ steps.set_env.outputs.ECS_CLUSTER }}
      ECS_SERVICE: ${{ steps.set_env.outputs.ECS_SERVICE }}
      ECR_IMAGE: ${{ steps.set_env.outputs.ECR_IMAGE }}
      TASK_DEFINITION: ${{ steps.set_env.outputs.TASK_DEFINITION }}
      ENVIRONMENT_BUCKET: ${{ steps.set_env.outputs.ENVIRONMENT_BUCKET }}

    steps:
      - id: vars
        shell: bash
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          ENV=${{ github.event.inputs.environment }}
          echo $BRANCH
          if [ -z "$ENV" ]
          then
            case $BRANCH in
              "dev")
                ENV="dev"
                ;;
              "stg")
                ENV="stg"
                ;;
              "master")
                ENV="prd"
                ;;
              *)
                echo "ENV not configured" && exit 1
                ;;
            esac
          fi
          if [[ $ENV == 'prd' && $BRANCH == 'master' ]]
          then
            echo "AWS_ROLE=PRD_AWS_ROLE" >> $GITHUB_OUTPUT
            echo "AWS_REGION=PRD_AWS_REGION" >> $GITHUB_OUTPUT
            echo "PROJECT_PREFIX=life-prd" >> $GITHUB_OUTPUT
            echo "SUBNETS=[\"subnet-0cce75b196f0b0f91\", \"subnet-0ecfab7ad6e9c808f\"]" >> $GITHUB_OUTPUT
            echo "SECURITY_GROUPS=[\"sg-0a59d6cefa4776cd4\"]" >> $GITHUB_OUTPUT
          elif [ $ENV == 'stg' ]
          then
            echo "AWS_ROLE=STG_AWS_ROLE" >> $GITHUB_OUTPUT
            echo "AWS_REGION=STG_AWS_REGION" >> $GITHUB_OUTPUT
            echo "PROJECT_PREFIX=life-stg" >> $GITHUB_OUTPUT
          elif [ $ENV == 'dev' ]
          then
            echo "AWS_ROLE=DEV_AWS_ROLE" >> $GITHUB_OUTPUT
            echo "AWS_REGION=DEV_AWS_REGION" >> $GITHUB_OUTPUT
            echo "PROJECT_PREFIX=life-dev" >> $GITHUB_OUTPUT
          else
            echo "Branch not configured!"
            exit 1
          fi
          echo "ENV=$ENV"  >> $GITHUB_OUTPUT
          echo ":rocket: Environment - $ENV " >> $GITHUB_STEP_SUMMARY
      - name: set variables
        id: set_env
        run: |
          PROJECT_PREFIX=${{ steps.vars.outputs.PROJECT_PREFIX }}
          echo "ECS_CLUSTER=$PROJECT_PREFIX-sg-ecs-cluster"  >> $GITHUB_OUTPUT
          echo "ECS_SERVICE=$PROJECT_PREFIX-svc-ai" >> $GITHUB_OUTPUT
          echo "ECR_IMAGE=$PROJECT_PREFIX-ecr-ai" >> $GITHUB_OUTPUT
          echo "TASK_DEFINITION=$PROJECT_PREFIX-td-ai" >> $GITHUB_OUTPUT
          echo "ENVIRONMENT_BUCKET=$PROJECT_PREFIX-s3-environment"  >> $GITHUB_OUTPUT
          echo ":seedling: Branch:${GITHUB_REF#refs/heads/}" >> $GITHUB_STEP_SUMMARY
  build:
    needs: prepare-env
    runs-on: ubuntu-22.04
    env:
      AWS_ROLE: ${{ needs.prepare-env.outputs.AWS_ROLE }}
      AWS_REGION: ${{ needs.prepare-env.outputs.AWS_REGION }}
      ECR_IMAGE: ${{ needs.prepare-env.outputs.ECR_IMAGE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars[env.AWS_ROLE] }}
          aws-region: ${{ vars[env.AWS_REGION] }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        run: |
          ECR_IMAGE_TAG="${ECR_IMAGE}:${GITHUB_SHA::7}-$GITHUB_RUN_NUMBER"
          docker build -t $ECR_IMAGE_TAG .
          docker tag $ECR_IMAGE_TAG ${{ vars.ECR_REPOSITORY }}/$ECR_IMAGE_TAG
          docker push ${{ vars.ECR_REPOSITORY }}/$ECR_IMAGE_TAG
  deploy:
    needs:
      - build
      - prepare-env
    runs-on: ubuntu-22.04
    env:
      AWS_ROLE: ${{ needs.prepare-env.outputs.AWS_ROLE }}
      AWS_REGION: ${{ needs.prepare-env.outputs.AWS_REGION }}
      ECR_IMAGE: ${{ needs.prepare-env.outputs.ECR_IMAGE }}
      ECS_SERVICE: ${{ needs.prepare-env.outputs.ECS_SERVICE }}
      ECS_CLUSTER: ${{ needs.prepare-env.outputs.ECS_CLUSTER }}
      TASK_DEFINITION: ${{ needs.prepare-env.outputs.TASK_DEFINITION }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars[env.AWS_ROLE] }}
          aws-region: ${{ vars[env.AWS_REGION] }}

      - name: Update ECS Task Definition
        run: |
          ECR_IMAGE_TAG="${ECR_IMAGE}:${GITHUB_SHA::7}-$GITHUB_RUN_NUMBER"
          TASK_DEFINITION=$(aws ecs describe-task-definition --task-definition "${TASK_DEFINITION}")
          echo "$TASK_DEFINITION" | jq --arg IMAGE "${{ vars.ECR_REPOSITORY }}/$ECR_IMAGE_TAG" \
            '.taskDefinition | .containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' > taskDefinition.json
      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: taskDefinition.json
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
