version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: ap-southeast-1
      AWS__ENDPOINT_URL: http://host.docker.internal:4566  # Points to ally-localstack on host (double underscore for pydantic nested config)
      AWS_ENDPOINT_URL: http://host.docker.internal:4566  # Also set single underscore for bootstrap script
      LOCALSTACK_HOST: host.docker.internal
      WEAVIATE__HTTP_HOST: weaviate
      WEAVIATE__GRPC_HOST: weaviate
    ports:
      - "8001:8000"
    command: ["bash", "-c", "/app/scripts/bootstrap_localstack.sh && poetry run python -m app.main & poetry run python -m app.core.queue.sqs_worker & wait -n"]
    depends_on:
      weaviate:
        condition: service_started
      localstack-wait:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Ensures host.docker.internal works
    networks:
      - lifeline-network

  # Wait service that checks if ally-localstack is ready
  localstack-wait:
    image: curlimages/curl:latest
    command:
      - sh
      - -c
      - |
        echo "Waiting for ally-localstack to be ready..."
        until curl -f http://host.docker.internal:4566/_localstack/health; do
          echo "LocalStack is not ready yet. Waiting..."
          sleep 2
        done
        echo "LocalStack is ready!"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"

  weaviate:
    image: semitechnologies/weaviate:1.28.3
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      - QUERY_DEFAULTS_LIMIT=20
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate-lifeline
      - ENABLE_CONSOLE=true
      - CLUSTER_HOSTNAME=weaviate
      - CLUSTER_SINGLE_NODE_MODE=true
    volumes:
      - weaviate_data:/var/lib/weaviate-lifeline
    networks:
      - lifeline-network

volumes:
  weaviate_data:
    driver: local

networks:
  lifeline-network:
    driver: bridge

