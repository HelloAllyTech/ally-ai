version: "3.8"

services:
  weaviate:
    image: semitechnologies/weaviate:1.28.3
    container_name: weaviate-lifeline
    ports:
      - "8080:8080"  # REST API (mapped to a different host port to avoid conflict)
      - "50051:50051"  # gRPC (mapped to a different host port to avoid conflict)
    environment:
      - QUERY_DEFAULTS_LIMIT=20  # Default limit for queries
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true  # Allow anonymous access
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate-lifeline  # Path for persistent data
      - ENABLE_CONSOLE=true  # Enable the web interface (Weaviate Console)
      - CLUSTER_HOSTNAME=weaviate  # Required even in single-node mode
      - CLUSTER_SINGLE_NODE_MODE=true  # Enable single-node mode
    volumes:
      - weaviate_data:/var/lib/weaviate-lifeline  # Persist data
    networks:
      - lifeline-network

  localstack:
    image: localstack/localstack:latest
    container_name: localstack-ally
    ports:
      - "4566:4566"  # LocalStack edge service
      - "4510-4559:4510-4559"  # external services port range
    environment:
      - SERVICES=sqs, s3
      - DEBUG=1
      - DATA_DIR=/var/lib/localstack/data
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_DEFAULT_REGION=ap-southeast-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lifeline-network

volumes:
  weaviate_data:
    driver: local
  localstack_data:
    driver: local

networks:
  lifeline-network:
    driver: bridge
